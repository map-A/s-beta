<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{company_name}} ({{company_code}}) - 供应链网络图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 28px;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .header .meta {
            color: #718096;
            font-size: 14px;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            height: 800px;
        }

        #chart {
            width: 100%;
            height: 100%;
        }

        .legend {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .legend h3 {
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 15px;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            margin-right: 25px;
            margin-bottom: 10px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .legend-label {
            font-size: 14px;
            color: #4a5568;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{company_name}} ({{company_code}}) - 供应链网络分析</h1>
            <div class="meta">
                分析日期: {{analysis_date}} |
                节点数: <span id="node-count">0</span> |
                关系数: <span id="edge-count">0</span>
            </div>
        </div>

        <div class="chart-container">
            <div id="chart"></div>
        </div>

        <div class="legend">
            <h3>图例</h3>
            <div class="legend-item">
                <div class="legend-color" style="background: #91cc75;"></div>
                <div class="legend-label">上游供应商</div>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #5470c6;"></div>
                <div class="legend-label">竞品公司</div>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ee6666;"></div>
                <div class="legend-label">目标公司</div>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #fac858;"></div>
                <div class="legend-label">下游客户</div>
            </div>
        </div>

        <div class="footer">
            Powered by ECharts | A股供应链分析系统 | 2026
        </div>
    </div>

    <script>
        // 从数据文件加载
        const graphData = {{graph_data}};

        // 更新统计信息
        document.getElementById('node-count').textContent = graphData.nodes.length;
        document.getElementById('edge-count').textContent = graphData.edges.length;

        // 初始化ECharts
        const chartDom = document.getElementById('chart');
        const myChart = echarts.init(chartDom);

        // 配置颜色映射
        const colorMap = {
            'upstream': '#91cc75',
            'competitor': '#5470c6',
            'target': '#ee6666',
            'downstream': '#fac858'
        };

        // 处理节点数据
        const nodes = graphData.nodes.map(node => ({
            id: node.id,
            name: node.name,
            symbolSize: node.symbolSize || 30,
            category: node.category,
            itemStyle: {
                color: colorMap[node.category]
            },
            label: {
                show: true,
                fontSize: 11,
                fontWeight: node.category === 'target' ? 'bold' : 'normal'
            },
            tooltip: {
                formatter: `<b>${node.name}</b><br/>${node.business}`
            }
        }));

        // 处理边数据
        const edges = graphData.edges.map(edge => ({
            source: edge.source,
            target: edge.target,
            lineStyle: {
                color: edge.relation === 'compete' ? '#ccc' : '#999',
                type: edge.relation === 'compete' ? 'dashed' : 'solid',
                curveness: 0.1
            }
        }));

        // ECharts配置
        const option = {
            title: {
                text: '供应链网络图',
                left: 'center',
                top: 10,
                textStyle: {
                    fontSize: 20,
                    fontWeight: 'bold',
                    color: '#2d3748'
                }
            },
            tooltip: {
                trigger: 'item',
                backgroundColor: 'rgba(50,50,50,0.9)',
                borderColor: '#333',
                textStyle: {
                    color: '#fff'
                }
            },
            animationDuration: 1500,
            animationEasingUpdate: 'quinticInOut',
            series: [
                {
                    type: 'graph',
                    layout: 'force',
                    data: nodes,
                    links: edges,
                    categories: graphData.categories,
                    roam: true,  // 允许缩放和平移
                    draggable: true,  // 允许拖拽节点
                    force: {
                        repulsion: 300,
                        edgeLength: [100, 200],
                        gravity: 0.1
                    },
                    label: {
                        show: true,
                        position: 'inside',
                        fontSize: 10
                    },
                    emphasis: {
                        focus: 'adjacency',
                        lineStyle: {
                            width: 5
                        },
                        itemStyle: {
                            shadowBlur: 10,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }
            ]
        };

        myChart.setOption(option);

        // 响应式调整
        window.addEventListener('resize', () => {
            myChart.resize();
        });

        // 点击节点事件
        myChart.on('click', (params) => {
            if (params.dataType === 'node') {
                console.log('Clicked node:', params.data);
            }
        });
    </script>
</body>
</html>
